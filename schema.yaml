version: "1"

# ─── Project ──────────────────────────────────────────────────
project:
  name: sgroups
  module: github.com/PRO-Robotech/sgroups
  apiGroup: sgroups.io
  apiVersion: v1alpha1
  protoPackage: sgroups.v1
  dbSchema: sgroups

# ─── Restrictions ─────────────────────────────────────────────
restrictions:
  name:
    pattern: "^[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?$"
    maxLength: 63
    description: "lowercase DNS label"
  namespace:
    pattern: "^[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?$"
    maxLength: 63
    description: "lowercase DNS label (same as name)"
  uid:
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
    description: "UUID v4"
  displayName:
    maxLength: 63
    description: "human-readable display name"
  labelKey:
    maxLength: 63
    pattern: "^[a-zA-Z][a-zA-Z0-9_.\\-]*$"
  labelValue:
    maxLength: 256

# ─── Types ────────────────────────────────────────────────────
types:
  policyAction:
    kind: enum
    values: [DENY, ALLOW]
    k8sName: Action
    mapping:
      go: PolicyAction
      proto: string

  proto:
    kind: enum
    values: [TCP, UDP, ICMP]
    mapping:
      go: Proto
      proto: string

  traffic:
    kind: enum
    values: [Both, Ingress, Egress]
    mapping:
      go: Traffic
      proto: string

  ipFamily:
    kind: enum
    k8sName: IPFamily
    values: [IPv4, IPv6]
    mapping:
      go: IPFamily
      proto: string

  cidr:
    kind: scalar
    k8sName: string
    mapping:
      sql: cidr
      go: IPNet
      proto: string

  dualStackIps:
    kind: scalar
    k8sName: DualStackIPs
    mapping:
      sql: jsonb
      go: DualStackIPs
      proto: DualStackIPs
    goFields:
      - { name: IPv4, type: "[]string", jsonName: "IPv4", protoName: Ipv4 }
      - { name: IPv6, type: "[]string", jsonName: "IPv6", protoName: Ipv6 }
    k8sFields:
      - { name: IPv4, type: "[]string", jsonName: "IPv4", omitEmpty: true }
      - { name: IPv6, type: "[]string", jsonName: "IPv6", omitEmpty: true }
    protoMessages:
      - name: DualStackIPs
        fields:
          - { name: ipv4, type: string, number: 1, repeated: true, jsonName: "IPv4" }
          - { name: ipv6, type: string, number: 2, repeated: true, jsonName: "IPv6" }

  hostInfo:
    kind: scalar
    k8sName: HostMetaInfo
    mapping:
      sql: jsonb
      go: HostInfo
      proto: HostMetaInfo
    goFields:
      - { name: HostName, type: string, jsonName: "hostName", protoName: HostName }
      - { name: OS, type: string, jsonName: "os", protoName: Os }
      - { name: Platform, type: string, jsonName: "platform", protoName: Platform }
      - { name: PlatformFamily, type: string, jsonName: "platformFamily", protoName: PlatformFamily }
      - { name: PlatformVersion, type: string, jsonName: "platformVersion", protoName: PlatformVersion }
      - { name: KernelVersion, type: string, jsonName: "kernelVersion", protoName: KernelVersion }
    k8sFields:
      - { name: HostName, type: string, jsonName: "hostName", omitEmpty: true }
      - { name: OS, type: string, jsonName: "os", omitEmpty: true }
      - { name: Platform, type: string, jsonName: "platform", omitEmpty: true }
      - { name: PlatformFamily, type: string, jsonName: "platformFamily", omitEmpty: true }
      - { name: PlatformVersion, type: string, jsonName: "platformVersion", omitEmpty: true }
      - { name: KernelVersion, type: string, jsonName: "kernelVersion", omitEmpty: true }
    protoMessages:
      - name: HostMetaInfo
        fields:
          - { name: host_name, type: string, number: 1 }
          - { name: os, type: string, number: 2 }
          - { name: platform, type: string, number: 3 }
          - { name: platform_family, type: string, number: 4 }
          - { name: platform_version, type: string, number: 5 }
          - { name: kernel_version, type: string, number: 6 }

  icmpTypes:
    kind: scalar
    mapping:
      go: ICMPTypes
      proto: ICMPTypes
    protoMessages:
      - name: ICMPTypes
        fields:
          - { name: values, type: int32, number: 1, repeated: true }

  transportEntry:
    kind: composite
    oneofBy: proto
    oneofVariants:
      tcpUdp: [TCP, UDP]
      icmp: [ICMP]
    fields:
      - { name: description, type: text }
      - { name: comment, type: text }
      - { name: ports, type: portRanges, oneofGroup: tcpUdp }
      - { name: types, type: "integer[]", oneofGroup: icmp }
    mapping:
      go: TransportEntry
      proto: TransportEntry
    goFields:
      - { name: Description, type: string, jsonName: "description", protoName: Description }
      - { name: Comment, type: string, jsonName: "comment", protoName: Comment }
      - { name: Ports, type: string, jsonName: "ports", protoName: Ports, omitEmpty: true }
      - { name: Types, type: "[]int", jsonName: "types", protoName: Types, omitEmpty: true }
    k8sFields:
      - { name: Description, type: string, jsonName: "description", omitEmpty: true }
      - { name: Comment, type: string, jsonName: "comment", omitEmpty: true }
      - { name: Ports, type: string, jsonName: "ports", omitEmpty: true }
      - { name: Types, type: "[]int", jsonName: "types", omitEmpty: true }
    protoMessages:
      - name: TransportEntry
        oneofName: entry
        fields:
          - { name: description, type: string, number: 1 }
          - { name: comment, type: string, number: 2 }
          - { name: ports, type: string, number: 3, oneofGroup: entry }
          - { name: types, type: ICMPTypes, number: 4, oneofGroup: entry }

  transportSpec:
    kind: scalar
    k8sName: Transport
    mapping:
      sql: jsonb
      go: TransportSpec
      proto: Transport
    goFields:
      - { name: Protocol, type: Proto, jsonName: "protocol", protoName: Protocol }
      - { name: IPv, type: IPFamily, jsonName: "IPv", protoName: IpV }
      - { name: Entries, type: "[]TransportEntry", jsonName: "entries", protoName: Entries }
    k8sFields:
      - { name: Protocol, type: Proto, jsonName: "protocol", protoName: Protocol }
      - { name: IPv, type: IPFamily, jsonName: "IPv", protoName: IpV }
      - { name: Entries, type: "[]TransportEntry", jsonName: "entries", protoName: Entries }
    protoMessages:
      - name: Transport
        fields:
          - { name: protocol, type: string, number: 1 }
          - { name: ip_v, type: string, number: 2, jsonName: "IPv" }
          - { name: entries, type: TransportEntry, number: 3, repeated: true }

  transport:
    kind: composite
    fields:
      - { name: protocol, type: proto }
      - { name: ipV, type: ipFamily }
      - { name: entries, type: "transportEntry[]" }

  resourceEventType:
    kind: enum
    values: [UNSPECIFIED, ADDED, MODIFIED, DELETED, INIT]
    mapping:
      go: ResourceEventType
      proto: ResourceEventType
    protoEnums:
      - name: ResourceEventType
        values:
          - { name: RESOURCE_EVENT_TYPE_UNSPECIFIED, number: 0 }
          - { name: ADDED, number: 1 }
          - { name: MODIFIED, number: 2 }
          - { name: DELETED, number: 3 }
          - { name: INIT, number: 4 }

# ─── Resources ────────────────────────────────────────────────
resources:
  - name: Tenant
    scope: cluster
    table: tenant
    indexPrefix: tenant
    httpPath: tenants
    immutable: [uid, name]
    list:
      selectors: res
      hasRefs: false
    events:
      channel: resource_Tenant

  - name: AddressGroup
    scope: namespaced
    table: address_group
    indexPrefix: address_group
    httpPath: address-groups
    spec:
      fields:
        - name: defaultAction
          type: policyAction
          default: "'DENY'"
          validate: "required, oneof=ALLOW DENY"
          selector: true
        - name: logs
          type: bool
          default: "false"
        - name: trace
          type: bool
          default: "false"
    immutable: [uid, name]
    hasBindingRev: true
    list:
      selectors: res
      hasRefs: true
      refTypes: [Host, Service, Network, Rule]
    events: { channel: resource_AddressGroup }

  - name: Network
    scope: namespaced
    table: network
    indexPrefix: nw
    httpPath: networks
    spec:
      fields:
        - name: cidr
          type: cidr
          sqlColumn: network
          jsonName: CIDR
          validate: "required, cidr"
    immutable: [uid, name]
    hasBindingRev: true
    list:
      selectors: res
      hasRefs: true
      refTypes: [AddressGroup]
    events:
      channel: resource_Network

  - name: Host
    scope: namespaced
    table: host
    indexPrefix: host
    httpPath: hosts
    spec:
      fields:
        - name: ips
          type: dualStackIps
          jsonName: IPs
          outputOnly: true
        - name: metaInfo
          type: hostInfo
          outputOnly: true
    immutable: [uid, name]
    hasBindingRev: true
    extraSyncers:
      - { name: HostIPs, sqlFunc: sync_host_ipset, fields: [uid, name, namespace, ips] }
      - { name: HostInfo, sqlFunc: sync_host_info, fields: [uid, name, namespace, metaInfo] }
    extraGrpcMethods:
      - name: UpdIPs
        scaffold: true
        httpPath: upd-ips
        httpVerb: POST
        syncerName: HostIPs
      - name: UpdMetaInfo
        scaffold: true
        httpPath: upd-metainfo
        httpVerb: POST
        syncerName: HostInfo
    k8sSubresources:
      - name: ips
        specField: ips
        grpcMethod: UpdIPs
      - name: metaInfo
        specField: metaInfo
        grpcMethod: UpdMetaInfo
    list:
      selectors: res
      hasRefs: true
      refTypes: [AddressGroup]
    events: { channel: resource_Host }

  - name: Service
    scope: namespaced
    table: service
    indexPrefix: service
    httpPath: services
    spec:
      fields:
        - name: transport
          type: transportSpec
          jsonName: transports
          repeated: true
          validate: "required"
    immutable: [uid, name]
    hasBindingRev: true
    list:
      selectors: res
      hasRefs: true
      refTypes: [AddressGroup, Rule]
    events: { channel: resource_Service }

  - name: HostBinding
    scope: namespaced
    kind: binding
    table: host_binding
    indexPrefix: host_binding
    httpPath: host-bindings
    refs:
      - { name: addressGroup, target: AddressGroup, sqlColumn: address_group, sqlFkTable: tbl_address_group, selector: true }
      - { name: host, target: Host, sqlColumn: host, sqlFkTable: tbl_host, selector: true }
    immutable: [uid, name, addressGroup, host]
    cascadeRev:
      - { parentTable: tbl_host, refColumn: host }
      - { parentTable: tbl_address_group, refColumn: address_group }
    list:
      selectors: custom
      hasRefs: true
      refTypes: [Host, AddressGroup]
    events: { channel: resource_HostBinding }

  - name: NetworkBinding
    scope: namespaced
    kind: binding
    table: network_binding
    indexPrefix: network_binding
    httpPath: network-bindings
    refs:
      - { name: addressGroup, target: AddressGroup, sqlColumn: address_group, sqlFkTable: tbl_address_group, selector: true }
      - { name: network, target: Network, sqlColumn: network, sqlFkTable: tbl_network, selector: true }
    immutable: [uid, name, addressGroup, network]
    cascadeRev:
      - { parentTable: tbl_network, refColumn: network }
      - { parentTable: tbl_address_group, refColumn: address_group }
    list:
      selectors: custom
      hasRefs: true
      refTypes: [Network, AddressGroup]
    events: { channel: resource_NetworkBinding }

  - name: ServiceBinding
    scope: namespaced
    kind: binding
    table: service_binding
    indexPrefix: service_binding
    httpPath: service-bindings
    crossNamespace: true
    refs:
      - { name: addressGroup, target: AddressGroup, sqlColumn: address_group, sqlFkTable: tbl_address_group, selector: true }
      - { name: service, target: Service, sqlColumn: service, sqlFkTable: tbl_service, selector: true }
    immutable: [uid, name, addressGroup, service]
    cascadeRev:
      - { parentTable: tbl_service, refColumn: service }
      - { parentTable: tbl_address_group, refColumn: address_group }
    list:
      selectors: custom
      hasRefs: true
      refTypes: [Service, AddressGroup]
    events: { channel: resource_ServiceBinding }

# ─── Roles ────────────────────────────────────────────────────
roles:
  admin:
    resources: ["*"]
    verbs: [create, read, update, delete, watch]
  viewer:
    resources: ["*"]
    verbs: [read, watch]
  networkAdmin:
    resources: [Network, NetworkBinding, AddressGroup]
    verbs: [create, read, update, delete, watch]
