version: "1"

# ─── Project ──────────────────────────────────────────────────
project:
  name: sgroups
  module: github.com/PRO-Robotech/sgroups
  apiGroup: sgroups.io
  apiVersion: v1alpha1
  protoPackage: sgroups.v1
  dbSchema: sgroups

# ─── Restrictions ─────────────────────────────────────────────
restrictions:
  name:
    pattern: "^[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?$"
    maxLength: 63
    description: "lowercase DNS label"
  namespace:
    pattern: "^[a-z0-9]([a-z0-9\\-]{0,61}[a-z0-9])?$"
    maxLength: 63
    description: "lowercase DNS label (same as name)"
  uid:
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
    description: "UUID v4"
  displayName:
    maxLength: 256
    description: "human-readable display name"
  labelKey:
    maxLength: 63
    pattern: "^[a-zA-Z][a-zA-Z0-9_.\\-]*$"
  labelValue:
    maxLength: 256

# ─── Types ────────────────────────────────────────────────────
types:
  policyAction:
    kind: enum
    values: [DENY, ALLOW]
    mapping:
      go: PolicyAction
      proto: string

  proto:
    kind: enum
    values: [TCP, UDP, ICMP]
    mapping:
      go: Proto
      proto: string

  traffic:
    kind: enum
    values: [Both, Ingress, Egress]
    mapping:
      go: Traffic
      proto: string

  ipFamily:
    kind: enum
    values: [IPv4, IPv6]
    mapping:
      go: IPFamily
      proto: string

  cidr:
    kind: scalar
    mapping:
      sql: cidr
      go: IPNet
      proto: string

  dualStackIps:
    kind: scalar
    k8sName: DualStackIPs
    mapping:
      sql: jsonb
      go: DualStackIPs
      proto: DualStackIPs

  hostInfo:
    kind: scalar
    k8sName: HostMetaInfo
    mapping:
      sql: jsonb
      go: HostInfo
      proto: HostMetaInfo

  transportSpec:
    kind: scalar
    mapping:
      sql: jsonb
      go: TransportSpec
      proto: Transport

  transportEntry:
    kind: composite
    oneofBy: proto
    oneofVariants:
      tcpUdp: [TCP, UDP]
      icmp: [ICMP]
    fields:
      - { name: description, type: text }
      - { name: comment, type: text }
      - { name: ports, type: portRanges, oneofGroup: tcpUdp }
      - { name: types, type: "integer[]", oneofGroup: icmp }

  transport:
    kind: composite
    fields:
      - { name: protocol, type: proto }
      - { name: ipV, type: ipFamily }
      - { name: entries, type: "transportEntry[]" }

# ─── Resources ────────────────────────────────────────────────
resources:
  - name: Tenant
    scope: cluster
    table: tenant
    indexPrefix: tenant
    httpPath: tenants
    immutable: [uid, name]
    list:
      selectors: res
      hasRefs: false
    events:
      channel: resource_Tenant

  - name: AddressGroup
    scope: namespaced
    table: address_group
    indexPrefix: address_group
    httpPath: address-groups
    spec:
      fields:
        - name: defaultAction
          type: policyAction
          default: "'DENY'"
          validate: "required, oneof=ALLOW DENY"
          selector: true
        - name: logs
          type: bool
          default: "false"
        - name: trace
          type: bool
          default: "false"
    immutable: [uid, name]
    hasBindingRev: true
    list:
      selectors: res
      hasRefs: true
      refTypes: [Host, Service, Network, Rule]
    events: { channel: resource_AddressGroup }

  - name: Network
    scope: namespaced
    table: network
    indexPrefix: nw
    httpPath: networks
    spec:
      fields:
        - name: cidr
          type: cidr
          sqlColumn: network
          jsonName: CIDR
          validate: "required, cidr"
    immutable: [uid, name]
    hasBindingRev: true
    list:
      selectors: res
      hasRefs: true
      refTypes: [AddressGroup]
    events:
      channel: resource_Network

  - name: Host
    scope: namespaced
    table: host
    indexPrefix: host
    httpPath: hosts
    spec:
      fields:
        - name: ips
          type: dualStackIps
          jsonName: IPs
          outputOnly: true
        - name: metaInfo
          type: hostInfo
          outputOnly: true
    immutable: [uid, name]
    hasBindingRev: true
    extraSyncers:
      - { name: HostIPs, sqlFunc: sync_host_ipset, fields: [uid, name, namespace, ips] }
      - { name: HostInfo, sqlFunc: sync_host_info, fields: [uid, name, namespace, metaInfo] }
    extraGrpcMethods:
      - name: UpdIPs
        scaffold: true
        httpPath: upd-iplist
        httpVerb: POST
      - name: UpdMetaInfo
        scaffold: true
        httpPath: upd-metainfo
        httpVerb: POST
    k8sSubresources:
      - name: ips
        specField: ips
        grpcMethod: UpdIPs
      - name: metaInfo
        specField: metaInfo
        grpcMethod: UpdMetaInfo
    list:
      selectors: res
      hasRefs: true
      refTypes: [AddressGroup]
    events: { channel: resource_Host }

  - name: Service
    scope: namespaced
    table: service
    indexPrefix: service
    httpPath: services
    spec:
      fields:
        - name: transport
          type: transportSpec
          jsonName: transports
          repeated: true
          validate: "required"
    immutable: [uid, name]
    hasBindingRev: true
    list:
      selectors: res
      hasRefs: true
      refTypes: [AddressGroup, Rule]
    events: { channel: resource_Service }

  - name: HostBinding
    scope: namespaced
    kind: binding
    table: host_binding
    indexPrefix: host_binding
    httpPath: host-bindings
    refs:
      - { name: addressGroup, target: AddressGroup, sqlColumn: address_group, sqlFkTable: tbl_address_group, selector: true }
      - { name: host, target: Host, sqlColumn: host, sqlFkTable: tbl_host, selector: true }
    immutable: [uid, name, addressGroup, host]
    cascadeRev:
      - { parentTable: tbl_host, refColumn: host }
      - { parentTable: tbl_address_group, refColumn: address_group }
    list:
      selectors: custom
      hasRefs: true
      refTypes: [Host, AddressGroup]
    events: { channel: resource_HostBinding }

  - name: NetworkBinding
    scope: namespaced
    kind: binding
    table: network_binding
    indexPrefix: network_binding
    httpPath: network-bindings
    refs:
      - { name: addressGroup, target: AddressGroup, sqlColumn: address_group, sqlFkTable: tbl_address_group, selector: true }
      - { name: network, target: Network, sqlColumn: network, sqlFkTable: tbl_network, selector: true }
    immutable: [uid, name, addressGroup, network]
    cascadeRev:
      - { parentTable: tbl_network, refColumn: network }
      - { parentTable: tbl_address_group, refColumn: address_group }
    list:
      selectors: custom
      hasRefs: true
      refTypes: [Network, AddressGroup]
    events: { channel: resource_NetworkBinding }

  - name: ServiceBinding
    scope: namespaced
    kind: binding
    table: service_binding
    indexPrefix: service_binding
    httpPath: service-bindings
    crossNamespace: true
    refs:
      - { name: addressGroup, target: AddressGroup, sqlColumn: address_group, sqlFkTable: tbl_address_group, selector: true }
      - { name: service, target: Service, sqlColumn: service, sqlFkTable: tbl_service, selector: true }
    immutable: [uid, name, addressGroup, service]
    cascadeRev:
      - { parentTable: tbl_service, refColumn: service }
      - { parentTable: tbl_address_group, refColumn: address_group }
    list:
      selectors: custom
      hasRefs: true
      refTypes: [Service, AddressGroup]
    events: { channel: resource_ServiceBinding }

# ─── Roles ────────────────────────────────────────────────────
roles:
  admin:
    resources: ["*"]
    verbs: [create, read, update, delete, watch]
  viewer:
    resources: ["*"]
    verbs: [read, watch]
  networkAdmin:
    resources: [Network, NetworkBinding, AddressGroup]
    verbs: [create, read, update, delete, watch]
